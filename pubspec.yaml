name: disaster_app_ui
description: DisasterAid complete updated project
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  get: ^4.6.6

  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  location: ^6.0.1
  xml: ^6.6.1

  http: ^1.2.1
  connectivity_plus: ^6.0.3

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.1.3

  # ✅ Keep only ONE PDF viewer (Syncfusion)
  syncfusion_flutter_pdfviewer: ^26.2.14

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  flutter_easyloading: ^3.0.5
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  cached_network_image: ^3.4.1
  flutter_local_notifications: ^17.0.0

  image_picker: ^1.1.2
  intl: ^0.19.0
  geolocator: ^14.0.2
  device_info_plus: ^10.1.0
  battery_plus: ^6.0.1
  permission_handler: ^11.3.1

  font_awesome_flutter: ^10.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/lottie/
    - assets/fonts/
    - assets/data/
    - assets/pdfs/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  remove_alpha_ios: true